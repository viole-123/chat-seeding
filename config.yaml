service_name: uniscore-seeding-bot

kafka:
  brokers:
    - localhost:9092
  topic: seeding-events
  username: ""
  password: ""
  retries: 3
  producer_return_success: true

redis_matches:
  addr: 103.109.101.226:6379
  username: "default"
  password: "@UnityScore123!" 
  db: 0

database:
  url: "postgres://postgres:postgres@localhost:5433/uniscore_seeding?sslmode=disable"
  

vllm:
  api_url: "http://localhost:11434"
  model: "gpt-oss:120b-cloud"
  timeout: 90s

seeding_policy:
  max_messages_bot: 100
  bot_ratio: 0.3
  cooldown: 60s
  max_events_per_hour: 1000
  dedup_window: 24h
  enable_kill_switch: true

quality:
  min_length: 10
  max_length: 200
  banned_words: ["fuck", "shit", "damn"]
  dedup_ttl: 300

log:
  rotation_size: 100
  rotation_count: 5