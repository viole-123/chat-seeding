version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: uniscore-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: uniscore_seeding
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - seeding-network

  redis:
    image: redis:6-alpine
    container_name: uniscore-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - seeding-network

  # kafka:
  #   image: bitnami/kafka:latest
  #   container_name: uniscore-kafka
  #   ports:
  #     - "9092:9092"
  #   environment:
  #     - KAFKA_CFG_NODE_ID=0
  #     - KAFKA_CFG_PROCESS_ROLES=broker,controller
  #     - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
  #     - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
  #     - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
  #     - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
  #     - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
  #     - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
  #     - ALLOW_PLAINTEXT_LISTENER=yes
  #   volumes:
  #     - kafkadata:/bitnami/kafka
  #   networks:
  #     - seeding-network

  app:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    container_name: uniscore-seeding-bot
    ports:
      - "8081:8080"
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/uniscore_seeding?sslmode=disable
      - REDIS_ADDR=redis:6379
      - KAFKA_BROKERS=kafka:9092
      - VLLM_API_URL=http://host.docker.internal:11434
      - CONFIG_PATH=/app/config.docker.yaml
    volumes:
      - ../../config.docker.yaml:/app/config.docker.yaml:ro
      - ../../personas.yaml:/app/personas.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - seeding-network
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  # kafkadata:
  #   driver: local

networks:
  seeding-network:
    driver: bridge